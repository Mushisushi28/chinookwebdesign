<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Mark container - glassmorphism rounded square -->
  <rect x="2" y="2" width="56" height="56" rx="14" ry="14"
        fill="#0a192f" stroke="url(#cGrad)" stroke-width="1.5"/>
  <rect x="4" y="4" width="52" height="52" rx="12" ry="12"
        fill="url(#bgGrad)"/>

  <!-- Stylized C - bold open arc -->
  <path d="M39 14 C50 11, 54 18, 52 30 C50 42, 42 50, 32 47"
        stroke="url(#cGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Mountain peak accent inside C -->
  <path d="M18 44 L27 28 L36 44"
        stroke="#64ffda" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Wind arcs - Chinook wind motif -->
  <path d="M42 22 Q52 19, 56 23" stroke="#64ffda" stroke-width="1.8"
        fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M44 32 Q53 30, 57 33" stroke="#00b4d8" stroke-width="1.2"
        fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="72" y="28" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-size="26" font-weight="700" fill="#e6f1ff" letter-spacing="-0.5">
    Chinook
  </text>
  <text x="72" y="48" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-size="10.5" font-weight="400" fill="#64ffda" letter-spacing="3.5" opacity="0.85">
    WEB DESIGN
  </text>
</svg>
